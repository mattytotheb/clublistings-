<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Club Listings</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Arial, Helvetica, sans-serif;
    color: #222;
  }
  body { padding: 10px 0; }
  .listings-container {
    text-align: center;
    background: #ffffff;
    border: 5px solid #daa520;
    padding: 0 20px 25px 20px;
    width: 90%;
    max-width: 1200px;
    margin: 0 auto;
    box-sizing: border-box;
  }
  .header-img {
    max-width: 100%;
    height: auto;
    margin-top: 10px;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }
  .listings-title {
    color: #b8860b;
    font-size: 1.6em;
    font-weight: bold;
    margin: 18px 0 6px 0;
    letter-spacing: 0.5px;
  }
  .listings-subtitle {
    font-size: 1.15em;
    font-weight: bold;
    margin: 0 0 12px 0;
  }
  hr {
    border: 0;
    border-top: 1px solid #ddd;
    margin: 12px auto;
    width: 80%;
  }
  .featured-venues { margin: 14px 0 4px 0; }
  .featured-venues a {
    color: #b8860b;
    text-decoration: none;
    font-size: 1.1em;
    font-weight: bold;
    display: block;
    line-height: 1.9;
  }
  .featured-venues a:hover { text-decoration: underline; }
  .day-section { text-align: left; margin: 18px auto 0; max-width: 90%; }
  .day-header {
    color: #b8860b;
    font-size: 1.2em;
    font-weight: bold;
    margin: 16px 0 6px 0;
  }
  .event { margin: 3px 0; line-height: 1.55; }
  .venue-name { font-weight: bold; }
  .town { text-transform: uppercase; }
  .status { padding: 30px; text-align: center; color: #777; }
  .status.error { color: #b00020; }
  .footer-stamp {
    margin-top: 20px;
    font-size: 0.75em;
    color: #999;
    text-align: center;
  }
</style>
</head>
<body>

<div class="listings-container">
  <img src="https://www.pixy103.com/images/LISTINGS1.jpg" alt="Club Listings" class="header-img">
  <div class="listings-title">CLUB LISTINGS</div>
  <div class="listings-subtitle">If you're out and about this week<br>check out what's happening at...</div>
  <hr>
  <div id="featured" class="featured-venues">
    <div class="status">Loading...</div>
  </div>
  <div id="schedule"></div>
  <div id="stamp" class="footer-stamp"></div>
</div>

<script>
  // ============================================================
  // Replace this with your GAS web app /exec URL
  const API_URL = 'https://script.google.com/macros/s/AKfycbxZuxWZE7bUMhP1EAg05I2tpm5qaGM1DxOSgZJqqaDHm-n_lDK_S_jFeWOcKJGweKYcNA/exec';
  // ============================================================

  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function getCurrentWeek() {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const week = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      week.push(d);
    }
    return week;
  }

  function formatDate(d) {
    return DAYS[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  function dateKey(d) {
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + m + '-' + day;
  }

  function parseSheetDate(val) {
    if (!val) return null;
    const d = new Date(val);
    return isNaN(d.getTime()) ? null : d;
  }

  function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function render(data) {
    const featuredEl = document.getElementById('featured');
    featuredEl.innerHTML = '';
    (data.featured || []).forEach(v => {
      if (!v.Name || !v.URL) return;
      const a = document.createElement('a');
      a.href = v.URL;
      a.target = '_blank';
      a.rel = 'noopener';
      a.textContent = v.Name;
      featuredEl.appendChild(a);
    });

    const scheduleEl = document.getElementById('schedule');
    scheduleEl.innerHTML = '';

    const week = getCurrentWeek();

    const variableByDate = {};
    (data.thisWeek || []).forEach(ev => {
      const d = parseSheetDate(ev.Date);
      if (!d) return;
      const key = dateKey(d);
      (variableByDate[key] = variableByDate[key] || []).push(ev);
    });

    const recurringByDay = {};
    (data.recurring || []).forEach(ev => {
      const day = String(ev.Day || '').trim();
      if (!day) return;
      (recurringByDay[day] = recurringByDay[day] || []).push(ev);
    });

    let anyRendered = false;

    week.forEach(d => {
      const dayName = DAYS[d.getDay()];
      const events = []
        .concat(recurringByDay[dayName] || [])
        .concat(variableByDate[dateKey(d)] || []);

      if (events.length === 0) return;
      anyRendered = true;

      // Group events by Venue|Town so multiple acts at the same venue/day combine
      const grouped = {};
      const groupOrder = [];
      events.forEach(ev => {
        const key = (ev.Venue || '') + '|' + (ev.Town || '');
        if (!grouped[key]) {
          grouped[key] = { venue: ev.Venue || '', town: ev.Town || '', acts: [] };
          groupOrder.push(key);
        }
        const time = ev.Time ? ' ' + ev.Time : '';
        grouped[key].acts.push((ev.Event || '') + time);
      });

      groupOrder.sort((a, b) =>
        grouped[a].venue.toLowerCase().localeCompare(grouped[b].venue.toLowerCase())
      );

      const section = document.createElement('div');
      section.className = 'day-section';

      const header = document.createElement('div');
      header.className = 'day-header';
      header.textContent = formatDate(d);
      section.appendChild(header);

      groupOrder.forEach(key => {
        const g = grouped[key];
        const div = document.createElement('div');
        div.className = 'event';
        div.innerHTML =
          '<span class="venue-name">' + escapeHtml(g.venue) + '</span> ' +
          '<span class="town">' + escapeHtml(g.town) + '</span> - ' +
          g.acts.map(escapeHtml).join(' / ');
        section.appendChild(div);
      });

      scheduleEl.appendChild(section);
    });

    if (!anyRendered) {
      scheduleEl.innerHTML = '<div class="status">No events scheduled for this week.</div>';
    }

    const stamp = document.getElementById('stamp');
    if (data.generatedAt) {
      stamp.textContent = 'Updated ' + new Date(data.generatedAt).toLocaleString();
    }

    reportHeight();
  }

  function loadListings() {
    fetch(API_URL)
      .then(r => r.json())
      .then(data => {
        if (data.error) throw new Error(data.error);
        render(data);
      })
      .catch(err => {
        document.getElementById('featured').innerHTML =
          '<div class="status error">Unable to load listings: ' + escapeHtml(err.message) + '</div>';
        document.getElementById('schedule').innerHTML = '';
        reportHeight();
      });
  }

  // Auto-resize iframe in parent (Joomla)
  // Measure only the visible content container, not the full document
  let lastReportedHeight = 0;

  function reportHeight() {
    try {
      const container = document.querySelector('.listings-container');
      if (!container) return;
      // Use bounding rect bottom to get the actual content edge
      const rect = container.getBoundingClientRect();
      const h = Math.ceil(rect.bottom + 20); // 20px breathing room
      // Only post if height changed by more than 2px (avoids feedback loop)
      if (Math.abs(h - lastReportedHeight) < 3) return;
      lastReportedHeight = h;
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'club-listings-resize', height: h }, '*');
      }
    } catch (e) {}
  }

  window.addEventListener('load', () => {
    loadListings();
    setTimeout(reportHeight, 300);
    setTimeout(reportHeight, 800);
  });
</script>
</body>
</html>
